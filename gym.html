          nameInp.value = "";
          muscInp.value = "";
          renderDraftExercises();
        };

        window.removeDraftExercise = function (idx) {
          currentDraftExercises.splice(idx, 1);
          if (currentEditingExerciseIndex === idx) {
            currentEditingExerciseIndex = -1;
            document.getElementById("add-exercise-btn").innerHTML =
              `<svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg> Add Exercise`;
            document.getElementById("ex-name").value = "";
            document.getElementById("ex-muscle").value = "";
          }
          renderDraftExercises();
        };

        window.renderDraftExercises = function () {
          const container = document.getElementById("exercises-preview");
          container.innerHTML = "";
          currentDraftExercises.forEach((ex, idx) => {
            const el = document.createElement("div");
            el.className = "exercise-pill";
            el.dataset.originalIndex = idx;
            el.innerHTML = `
                        <div style="display: flex; gap: 12px; align-items: center; width: 100%;">
                            <div class="drag-handle" style="color: var(--outline-variant); cursor: grab; padding: 10px 0; touch-action: none;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="15" x2="16" y2="15"/></svg>
                            </div>
                            <div class="exercise-pill-info" style="flex: 1;">
                                <div class="ex-name">${ex.name}</div>
                                <div class="ex-meta">${ex.type} • ${ex.muscle}</div>
                            </div>
                            <div style="display: flex; gap: 4px;">
                                <button class="ex-remove-btn" style="color: var(--primary);" onclick="editDraftExercise(${idx})">EDIT</button>
                                <button class="ex-remove-btn" onclick="removeDraftExercise(${idx})">DEL</button>
                            </div>
                        </div>
                    `;
            container.appendChild(el);
          });

          // Attach touch/mouse custom dragging
          let draggingEl = null;
          let placeholder = null;
          let dragStartY = 0;
          let initialTop = 0;

          container.querySelectorAll(".exercise-pill").forEach((el) => {
            const handle = el.querySelector(".drag-handle");
            if (!handle) return;

            const startDrag = (e) => {
              e.preventDefault();
              if (draggingEl) return;

              draggingEl = el;
              const rect = el.getBoundingClientRect();

              placeholder = document.createElement("div");
              placeholder.className = "exercise-pill";
              placeholder.style.height = rect.height + "px";
              placeholder.style.background = "transparent";
              placeholder.style.border = "2px dashed var(--outline-variant)";
              container.insertBefore(placeholder, el);

              dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
              initialTop = rect.top;

              el.style.position = "fixed";
              el.style.top = rect.top + "px";
              el.style.left = rect.left + "px";
              el.style.width = rect.width + "px";
              el.style.zIndex = "9999";
              el.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)";
              el.style.transform = "scale(1.02)";
              el.style.transition = "none";

              document.addEventListener("mousemove", onDrag);
              document.addEventListener("touchmove", onDrag, {
                passive: false,
              });
              document.addEventListener("mouseup", endDrag);
              document.addEventListener("touchend", endDrag);
            };

            handle.addEventListener("mousedown", startDrag);
            handle.addEventListener("touchstart", startDrag, {
              passive: false,
            });
          });

          const onDrag = (e) => {
            if (!draggingEl) return;
            e.preventDefault();

            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dy = clientY - dragStartY;

            draggingEl.style.top = initialTop + dy + "px";

            const siblings = [
              ...container.querySelectorAll(".exercise-pill"),
            ].filter((n) => n !== draggingEl && n !== placeholder);

            let nextSibling = siblings.find((sibling) => {
              const rect = sibling.getBoundingClientRect();
              return clientY < rect.top + rect.height / 2;
            });

            if (nextSibling) {
              container.insertBefore(placeholder, nextSibling);
            } else {
              container.appendChild(placeholder);
            }
          };

          const endDrag = () => {
            if (!draggingEl) return;

            draggingEl.style.position = "";
            draggingEl.style.top = "";
            draggingEl.style.left = "";
            draggingEl.style.width = "";
            draggingEl.style.zIndex = "";
            draggingEl.style.boxShadow = "";
            draggingEl.style.transform = "";
            draggingEl.style.transition = "";

            container.insertBefore(draggingEl, placeholder);
            placeholder.remove();

            const newElementsArray = [
              ...container.querySelectorAll(".exercise-pill"),
            ];
            const fromIdx = parseInt(draggingEl.dataset.originalIndex);
            const toIdx = newElementsArray.indexOf(draggingEl);

            if (fromIdx !== toIdx) {
              const movedItem = currentDraftExercises.splice(fromIdx, 1)[0];
              currentDraftExercises.splice(toIdx, 0, movedItem);

              if (currentEditingExerciseIndex === fromIdx) {
                currentEditingExerciseIndex = toIdx;
              } else if (
                fromIdx < currentEditingExerciseIndex &&
                toIdx >= currentEditingExerciseIndex
              ) {
                currentEditingExerciseIndex--;
              } else if (
                fromIdx > currentEditingExerciseIndex &&
                toIdx <= currentEditingExerciseIndex
              ) {
                currentEditingExerciseIndex++;
              }
            }

            draggingEl = null;
            document.removeEventListener("mousemove", onDrag);
            document.removeEventListener("touchmove", onDrag);
            document.removeEventListener("mouseup", endDrag);
            document.removeEventListener("touchend", endDrag);

            renderDraftExercises();
          };
        };

        window.saveRoutine = function () {
          const name = document.getElementById("routine-name").value.trim();
          const image = document.getElementById("routine-image").value.trim();
          const time =
            document.getElementById("routine-time").value.trim() || "0";

          if (!name) return alert("Routine name is required");
          if (currentDraftExercises.length === 0)
            return alert("Add at least one exercise to the routine");

          const savedRoutines = JSON.parse(
            localStorage.getItem("kinetic_routines") || "[]",
          );

          if (currentEditingRoutineId) {
            const idx = savedRoutines.findIndex(
              (r) => r.id === currentEditingRoutineId,
            );
            if (idx !== -1) {
              savedRoutines[idx] = {
                id: currentEditingRoutineId,
                name,
                image,
                time,
                exercises: currentDraftExercises,
              };
            }
          } else {
            const routineData = {
              id: Date.now().toString(),
              name,
              image,
              time,
              exercises: currentDraftExercises,
            };
            savedRoutines.push(routineData);
          }

          localStorage.setItem(
            "kinetic_routines",
            JSON.stringify(savedRoutines),
          );

          closeRoutineModal();
          renderRoutinesList();
        };

        window.renderRoutinesList = function () {
          const container = document.getElementById("routines-list");
          if (!container) return;

          const savedRoutines = JSON.parse(
            localStorage.getItem("kinetic_routines") || "[]",
          );

          // Remove all existing routine cards
          const existingCards = container.querySelectorAll(".routine-card");
          existingCards.forEach((c) => c.remove());

          const newBtn = container.querySelector(".add-routine-card");

          savedRoutines.forEach((routine) => {
            const el = document.createElement("div");
            el.className = "routine-card";

            const bgHtml = routine.image
              ? `<div class="routine-card-bg" style="background-image: url('${routine.image}')"></div>`
              : `<div class="routine-card-bg" style="background: var(--surface-container-highest);"></div>`;

            // Compile explicit tallies
            let compoundCount = 0;
            let isolationCount = 0;
            (routine.exercises || []).forEach((e) => {
              if (e.type === "Compound") compoundCount++;
              else if (e.type === "Isolation") isolationCount++;
            });

            let tagsHtml = "";
            if (compoundCount > 0)
              tagsHtml += `<span class="tag accent">${compoundCount} Compound</span>`;
            if (isolationCount > 0)
              tagsHtml += `<span class="tag" style="background: rgba(255,255,255,0.15); color: var(--text-primary); backdrop-filter: blur(12px);">${isolationCount} Isolation</span>`;

            el.innerHTML = `
                        ${bgHtml}
                        <div class="routine-card-content">
                            <div class="routine-tags">
                                <span class="tag">${(routine.exercises || []).length} Exercises</span>
                                ${tagsHtml}
                            </div>
                            <div class="routine-title">${routine.name}</div>
                            <div class="routine-meta">
                                <div class="meta-item">
                                    <span class="meta-value">${routine.time}</span>
                                    <span class="meta-label">Mins</span>
                                </div>
                            </div>
                        </div>
                        <button class="routine-play-btn" onclick="openRoutineModal('${routine.id}')">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a.996.996 0 000-1.41l-2.34-2.34a.996.996 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                    `;
            container.insertBefore(el, newBtn);
          });
        };

        // Initial render
        renderRoutinesList();

        // --- Workout Tracking Logic ---
        window.currentSelectedDate = null;
        let workoutTimerInterval = null;

        document.addEventListener("dateSelected", (e) => {
          window.currentSelectedDate = e.detail.date;
          if (window.renderWorkoutView) window.renderWorkoutView(e.detail.date);
        });

        window.renderWorkoutView = function (dateStr) {
          const container = document.getElementById("workout-content");
          if (!container) return;

          const key = `kinetic_workout_${dateStr}`;
          const dataStr = localStorage.getItem(key);

          if (!dataStr) {
            container.innerHTML = `
                        <div class="add-workout-btn" onclick="openSelectRoutineModal('${dateStr}')">
                            + LOG WORKOUT
                        </div>
                    `;
            clearInterval(workoutTimerInterval);
          } else {
            renderActiveWorkout(dateStr, JSON.parse(dataStr));
          }
        };

        window.openSelectRoutineModal = function (dateStr) {
          window.currentSelectedDate = dateStr;
          document
            .getElementById("select-routine-overlay")
            .classList.add("active");
          document
            .getElementById("select-routine-modal")
            .classList.add("active");

          const list = document.getElementById("select-routine-list");
          const savedRoutines = JSON.parse(
            localStorage.getItem("kinetic_routines") || "[]",
          );

          if (savedRoutines.length === 0) {
            list.innerHTML = `<p style="text-align:center; color: var(--text-secondary);">No routines found. Go to Routines to create one.</p>`;
            return;
          }

          list.innerHTML = savedRoutines
            .map(
              (r) => `
                    <div class="select-routine-item" onclick="selectRoutineForDate('${r.id}')">
                        <div class="select-routine-item-info">
                            <h4>${r.name}</h4>
                            <p>${(r.exercises || []).length} Exercises • ${r.time} Mins</p>
                        </div>
                        <div style="color: var(--primary);">
                            <svg viewBox="0 0 24 24" width="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </div>
                    </div>
                `,
            )
            .join("");

          // Add a "Custom Empty Workout" option
          list.innerHTML += `
                    <div class="select-routine-item" onclick="selectRoutineForDate('CUSTOM')" style="border: 1px dashed var(--outline-variant); background: transparent; margin-top:12px;">
                        <div class="select-routine-item-info">
                            <h4>Custom Freestyle Session</h4>
                            <p>Build on the fly</p>
                        </div>
                    </div>
                `;
        };

        window.closeSelectRoutineModal = function () {
          document
            .getElementById("select-routine-overlay")
            .classList.remove("active");
          document
            .getElementById("select-routine-modal")
            .classList.remove("active");
        };

        window.selectRoutineForDate = function (routineId) {
          if (!window.currentSelectedDate) return;

          let workoutData;
          if (routineId === "CUSTOM") {
            workoutData = {
              name: "Freestyle Session",
              startTime: Date.now(),
              accumulatedSeconds: 0,
              lastActiveTimestamp: null,
              isTimerRunning: false,
              exercises: [],
            };
          } else {
            const savedRoutines = JSON.parse(
              localStorage.getItem("kinetic_routines") || "[]",
            );
            const r = savedRoutines.find((x) => x.id === routineId);
            if (!r) return;

            // Deep copy exercises and setup empty sets
            const exercises = JSON.parse(JSON.stringify(r.exercises || [])).map(
              (ex) => ({
                ...ex,
                sets: [
                  {
                    weight: "",
                    reps: "",
                    intensity: "WORKING",
                    completed: false,
                  },
                ],
              }),
            );

            workoutData = {
              name: r.name,
              startTime: Date.now(),
              accumulatedSeconds: 0,
              lastActiveTimestamp: null,
              isTimerRunning: false,
              exercises: exercises,
            };
          }

          const key = `kinetic_workout_${window.currentSelectedDate}`;
          localStorage.setItem(key, JSON.stringify(workoutData));

          closeSelectRoutineModal();
          renderWorkoutView(window.currentSelectedDate);
          startWorkoutTimer(window.currentSelectedDate);
        };

        window.isTimerRunningFor = function (dateStr) {
          const key = `kinetic_workout_${dateStr}`;
          const dataSt = localStorage.getItem(key);
          if(!dataSt) return false;
          return JSON.parse(dataSt).isTimerRunning;
        };

        window.currentActiveExerciseIndex = -1;

        window.formatTime = function (sec) {
          const h = Math.floor(sec / 3600);
          const m = Math.floor((sec % 3600) / 60);
          const s = sec % 60;
          if (h > 0)
            return `${h}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
          return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
        };

        window.toggleWorkoutTimer = function () {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          if (!data) return;

          if (data.isTimerRunning) {
              if (data.lastActiveTimestamp) {
                  data.accumulatedSeconds = (data.accumulatedSeconds || 0) + Math.floor((Date.now() - data.lastActiveTimestamp) / 1000);
              }
              data.isTimerRunning = false;
              data.lastActiveTimestamp = null;
          } else {
              data.isTimerRunning = true;
              data.lastActiveTimestamp = Date.now();
          }
          localStorage.setItem(key, JSON.stringify(data));
          renderWorkoutView(window.currentSelectedDate);
        };

        window.finishWorkout = function () {
          toggleWorkoutTimer();
          window.currentActiveExerciseIndex = -1;
          renderWorkoutView(window.currentSelectedDate);
        };

        window.startWorkoutTimer = function (dateStr) {
          clearInterval(workoutTimerInterval);
          const key = `kinetic_workout_${dateStr}`;

          workoutTimerInterval = setInterval(() => {
            const dataSt = localStorage.getItem(key);
            if (!dataSt) {
              clearInterval(workoutTimerInterval);
              return;
            }

            const data = JSON.parse(dataSt);
            if (!data.isTimerRunning) return;

            let displaySecs = data.accumulatedSeconds || 0;
            if (data.lastActiveTimestamp) {
                displaySecs += Math.floor((Date.now() - data.lastActiveTimestamp) / 1000);
            }

            const timeEl = document.getElementById("workout-top-timer");
            if (timeEl) timeEl.innerText = formatTime(displaySecs);
          }, 1000);
        };

        window.renderActiveWorkout = function (dateStr, data) {
          const container = document.getElementById("workout-content");

          // Calculate volume (sum of weight * reps for completed sets)
          let totalVolume = 0;
          let completedSets = 0;
          let totalSets = 0;
          let prCount = 0;

          (data.exercises || []).forEach((ex) => {
            (ex.sets || []).forEach((set) => {
              totalSets++;
              if (set.completed) {
                completedSets++;
                const w = parseFloat(set.weight) || 0;
                const r = parseInt(set.reps) || 0;
                totalVolume += w * r;
                if (set.intensity === "PR") prCount++;
              }
            });
          });

          let volStr =
            totalVolume > 10000
              ? (totalVolume / 1000).toFixed(1) + "k"
              : totalVolume;

          const dObj = new Date(dateStr);
          const dayName = dObj.toLocaleDateString("en-US", {
            weekday: "short",
          });
          const monthName = dObj.toLocaleDateString("en-US", {
            month: "short",
          });
          const dateNum = dObj.getDate();

          let displaySecsForUI = data.accumulatedSeconds || 0;
          if (data.isTimerRunning && data.lastActiveTimestamp) {
              displaySecsForUI += Math.floor((Date.now() - data.lastActiveTimestamp) / 1000);
          }

          let html = `
                    <div class="heroic-card">
                        <div class="heroic-header">
                            <span class="heroic-tag">${(data.exercises || []).length} EXERCISES</span>
                            <span class="heroic-time">${dayName}, ${monthName} ${dateNum}</span>
                        </div>
                        <h2 class="heroic-title">${data.name}</h2>
                        
                        <div class="heroic-stats">
                            <div class="heroic-stat">
                                <span class="heroic-stat-label">Volume</span>
                                <span class="heroic-stat-val">${volStr} <small>Lbs</small></span>
                            </div>
                            <div class="heroic-stat" style="position:relative;">
                                <span class="heroic-stat-label">Time</span>
                                <span class="heroic-stat-val" id="workout-top-timer">${formatTime(displaySecsForUI)}</span>
                                <button onclick="toggleWorkoutTimer()" style="position:absolute; right:12px; top:12px; background:transparent; border:none; color:var(--primary); cursor:pointer;">
                                    ${data.isTimerRunning ? '<svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>' : '<svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;

          let listHtml =
            '<div class="workout-queue-header" style="margin: 48px 0 24px;"><h3>Workout Queue</h3></div><div class="workout-list" id="workout-exercises-list" style="position:relative; margin-bottom: 24px;">';

          (data.exercises || []).forEach((ex, exIdx) => {
            const isCompleted =
              ex.sets &&
              ex.sets.length > 0 &&
              ex.sets.every((s) => s.completed);

            if (window.currentActiveExerciseIndex === exIdx) {
              // Render Fully Expanded Active Exercise
              let setsRows = "";
              const activeSetIdx = ex.sets
                ? ex.sets.findIndex((s) => !s.completed)
                : -1;

              (ex.sets || []).forEach((set, setIdx) => {
                const isSetCompleted = set.completed;
                const isSetActive = !isSetCompleted && setIdx === activeSetIdx;

                if (isSetActive) {
                  setsRows += `
                                    <div class="log-row active">
                                        <div style="display:flex; justify-content:space-between; width:100%; align-items:center; margin-bottom: 12px;">
                                            <div class="log-row-idx" style="width: auto;">SET ${String(setIdx + 1).padStart(2, "0")}</div>
                                            <button class="set-intensity-btn ${set.intensity || "WORKING"}" onclick="toggleSetIntensity(${exIdx}, ${setIdx})">${set.intensity || "WORKING"}</button>
                                        </div>
                                        <div style="width: 100%; display:flex; justify-content:space-between; align-items:center;">
                                            <div class="log-stepper-group">
                                                <button class="log-stepper-btn" onclick="stepVal(${exIdx}, ${setIdx}, 'weight', -5)">−</button>
                                                <div class="log-stepper-val">
                                                    <label>Weight (LBS)</label>
                                                    <input type="number" value="${set.weight}" onchange="updateSet(${exIdx}, ${setIdx}, 'weight', this.value)">
                                                </div>
                                                <button class="log-stepper-btn" onclick="stepVal(${exIdx}, ${setIdx}, 'weight', 5)">+</button>
                                            </div>
                                            <div class="log-stepper-group">
                                                <button class="log-stepper-btn" onclick="stepVal(${exIdx}, ${setIdx}, 'reps', -1)">−</button>
                                                <div class="log-stepper-val t-reps">
                                                    <label>Target Reps</label>
                                                    <input type="number" value="${set.reps}" onchange="updateSet(${exIdx}, ${setIdx}, 'reps', this.value)">
                                                </div>
                                                <button class="log-stepper-btn" onclick="stepVal(${exIdx}, ${setIdx}, 'reps', 1)">+</button>
                                            </div>
                                        </div>
                                        <button class="log-set-btn" onclick="toggleSetCompleted(${exIdx}, ${setIdx})">LOG SET →</button>
                                        <div style="width:100%; text-align:right; margin-top:12px;">
                                            <button style="background:none; border:none; color:rgba(255,69,58,0.8); font-size:0.6rem; text-transform:uppercase; cursor:pointer;" onclick="deleteSet(${exIdx}, ${setIdx})">DELETE SET</button>
                                        </div>
                                    </div>
                                `;
                } else {
                  setsRows += `
                                    <div class="log-row-static ${isSetCompleted ? "completed" : ""}">
                                        <div class="log-row-idx" style="width:20px;">${String(setIdx + 1).padStart(2, "0")}</div>
                                        
                                        <div class="log-col">
                                            <label>Weight</label>
                                            <val>${set.weight || "--"}</val>
                                        </div>
                                        <div class="log-col">
                                            <label>Reps</label>
                                            <val>${set.reps || "--"}</val>
                                        </div>
                                        <div class="log-col" style="width:70px;">
                                            <label>Level</label>
                                            <button class="set-intensity-btn ${set.intensity || "WORKING"}" style="transform:scale(0.8); line-height:1; white-space:nowrap; border:none; padding:4px 8px; margin-top:2px;" onclick="toggleSetIntensity(${exIdx}, ${setIdx})">${set.intensity || "WORKING"}</button>
                                        </div>
                                        
                                        <div style="display:flex; align-items:center; gap:8px;">
                                            <div class="log-complete-check" onclick="${isSetCompleted ? `toggleSetCompleted(${exIdx}, ${setIdx})` : ""}">
                                                ${isSetCompleted ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--outline-variant)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>'}
                                            </div>
                                        </div>
                                    </div>
                                `;
                }
              });

              listHtml += `
                            <div class="workout-list-item active-ex-card" data-idx="${exIdx}" style="background: var(--surface-container-high);">
                                <div class="active-ex-header">
                                    <div class="active-ex-info">
                                        <h3>${ex.name}</h3>
                                        <p>Primary: ${ex.muscle}</p>
                                    </div>
                                    <div style="display:flex; gap:8px;">
                                        <button class="active-ex-close" style="color:var(--secondary);" onclick="deleteExerciseFromWorkout(${exIdx})">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6L18.066 20.011A2 2 0 0 1 16.07 22H7.93a2 2 0 0 1-1.996-1.989L5 6m4 0V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                                        </button>
                                        <button class="active-ex-close" onclick="window.currentActiveExerciseIndex = -1; renderWorkoutView(window.currentSelectedDate);">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="active-ex-sets">
                                    ${setsRows}
                                </div>
                                <button class="add-set-btn" onclick="addWorkoutSet(${exIdx})">+ Add Set</button>
                                <button style="width:100%; border:2px solid rgba(255,255,255,0.1); background:transparent; color:var(--text-primary); border-radius:16px; padding:12px; margin-top:24px; font-family:var(--font-display); font-weight:800; font-size:0.85rem; text-transform:uppercase; cursor:pointer;" onclick="window.currentActiveExerciseIndex = -1; renderWorkoutView(window.currentSelectedDate);">
                                    ↓ EXERCISE FINISHED
                                </button>
                            </div>
                        `;
            } else {
              // Render in Queue
              const completedCount = (ex.sets || []).filter(
                (s) => s.completed,
              ).length;
              const totalCount = (ex.sets || []).length;

              let inactiveSetsHtml = "";
              if (completedCount > 0) {
                inactiveSetsHtml += `
                                <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05);">
                                    <table style="width:100%; border-collapse:collapse;">
                                        <thead>
                                            <tr>
                                                <th style="text-align:left; font-size:0.6rem; color:var(--text-secondary); text-transform:uppercase; padding-bottom:8px;">Set</th>
                                                <th style="text-align:center; font-size:0.6rem; color:var(--text-secondary); text-transform:uppercase; padding-bottom:8px;">Lbs</th>
                                                <th style="text-align:center; font-size:0.6rem; color:var(--text-secondary); text-transform:uppercase; padding-bottom:8px;">Reps</th>
                                                <th style="text-align:right; font-size:0.6rem; color:var(--text-secondary); text-transform:uppercase; padding-bottom:8px;">Level</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                            `;
                (ex.sets || []).forEach((s, sIdx) => {
                  if (s.completed) {
                    let weightStr =
                      parseFloat(s.weight) > 0 ? `${s.weight}` : "BW";
                    let intClass =
                      s.intensity === "WARMUP"
                        ? "#f39c12"
                        : s.intensity === "PR"
                          ? "#bf360c"
                          : s.intensity === "FAILURE"
                            ? "#d32f2f"
                            : "#ffffff";

                    inactiveSetsHtml += `
                                        <tr>
                                            <td style="padding: 4px 0; font-family:var(--font-display); font-weight:800; color:var(--outline-variant); opacity:0.8;">${String(sIdx + 1).padStart(2, "0")}</td>
                                            <td style="padding: 4px 0; text-align:center; font-family:var(--font-display); font-weight:800; color:var(--text-primary);">${weightStr}</td>
                                            <td style="padding: 4px 0; text-align:center; font-family:var(--font-display); font-weight:800; color:var(--text-primary);">${s.reps}</td>
                                            <td style="padding: 4px 0; text-align:right;">
                                                <span style="font-size:0.6rem; text-transform:uppercase; font-weight:800; color: ${intClass};">${s.intensity || "WORKING"}</span>
                                            </td>
                                        </tr>
                                    `;
                  }
                });
                inactiveSetsHtml += `
                                        </tbody>
                                    </table>
                                </div>
                            `;
              }

              listHtml += `
                            <div class="workout-list-item qued-ex-card" data-idx="${exIdx}" style="background: var(--surface-container-high);">
                                <div class="qued-ex-top">
                                    <div style="flex:1;">
                                        <div class="qued-ex-title">${ex.name}</div>
                                        <div class="qued-ex-meta">${completedCount}/${totalCount} SETS DONE • ${ex.type}</div>
                                    </div>
                                    <div class="qued-ex-actions">
                                        <button class="tag accent" style="border:none; cursor:pointer;" onclick="if(!isTimerRunningFor(window.currentSelectedDate)) toggleWorkoutTimer(); window.currentActiveExerciseIndex = ${exIdx}; renderWorkoutView(window.currentSelectedDate);">
                                            ${isCompleted ? "REVIEW" : "PERFORM"}
                                        </button>
                                        <div class="drag-handle" style="color:var(--outline-variant); margin-left:8px; cursor:grab; touch-action:none; padding: 10px 0;">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                                        </div>
                                    </div>
                                </div>
                                ${completedCount > 0 ? inactiveSetsHtml : ""}
                            </div>
                        `;
            }
          });

          listHtml += `</div>`;

          let finishBtn = `
                    <button class="add-set-btn" style="border: 2px dashed rgba(255,255,255,0.1); background: transparent; color: var(--text-secondary);" onclick="addAdHocExercise()">+ ADD EXERCISE TO QUEUE</button>
                    
                    <div style="display:flex; flex-direction:column; gap: 12px; margin-top: 40px;">
                        <button class="finish-workout-btn" style="margin-top:0;" onclick="finishWorkout()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg> 
                            ${data.isTimerRunning ? "FINISH WORKOUT" : "RESUME WORKOUT"}
                        </button>
                        <button style="background:transparent; border:1px solid rgba(255, 69, 58, 0.4); color:#ff453a; border-radius:24px; padding:16px; font-family:var(--font-display); font-weight:800; font-size:1rem; cursor:pointer;" onclick="deleteWorkoutSession()">
                            DELETE SESSION
                        </button>
                    </div>
                `;

          html += listHtml + finishBtn;
          container.innerHTML = html;

          // Keep timer running if not already
          if (!workoutTimerInterval) startWorkoutTimer(dateStr);

          // Attach touch/mouse custom dragging for queue
          attachWorkoutDrag(container.querySelector("#workout-exercises-list"));
        };

        window.attachWorkoutDrag = function (listContainer) {
          if (!listContainer) return;

          let draggingEl = null;
          let placeholder = null;
          let dragStartY = 0;
          let initialTop = 0;

          listContainer.querySelectorAll(".workout-list-item").forEach((el) => {
            const handle = el.querySelector(".drag-handle");
            if (!handle) return;

            const startDrag = (e) => {
              e.preventDefault();
              if (draggingEl) return;

              draggingEl = el;
              const rect = el.getBoundingClientRect();

              placeholder = document.createElement("div");
              placeholder.className = "workout-list-item";
              placeholder.style.height = rect.height + "px";
              placeholder.style.background = "transparent";
              placeholder.style.border = "2px dashed var(--outline-variant)";
              placeholder.style.borderRadius = "24px";
              placeholder.style.marginBottom = "12px";
              listContainer.insertBefore(placeholder, el);

              dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
              initialTop = rect.top;

              el.style.position = "fixed";
              el.style.top = rect.top + "px";
              el.style.left = rect.left + "px";
              el.style.width = rect.width + "px";
              el.style.zIndex = "9999";
              el.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)";
              el.style.transform = "scale(1.02)";
              el.style.transition = "none";

              document.addEventListener("mousemove", onDrag);
              document.addEventListener("touchmove", onDrag, {
                passive: false,
              });
              document.addEventListener("mouseup", endDrag);
              document.addEventListener("touchend", endDrag);
            };

            handle.addEventListener("mousedown", startDrag);
            handle.addEventListener("touchstart", startDrag, {
              passive: false,
            });
          });

          const onDrag = (e) => {
            if (!draggingEl) return;
            e.preventDefault();

            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dy = clientY - dragStartY;

            draggingEl.style.top = initialTop + dy + "px";

            const siblings = [
              ...listContainer.querySelectorAll(".workout-list-item"),
            ].filter((n) => n !== draggingEl && n !== placeholder);

            let nextSibling = siblings.find((sibling) => {
              const rect = sibling.getBoundingClientRect();
              return clientY < rect.top + rect.height / 2;
            });

            if (nextSibling) {
              listContainer.insertBefore(placeholder, nextSibling);
            } else {
              listContainer.appendChild(placeholder);
            }
          };

          const endDrag = () => {
            if (!draggingEl) return;

            document.removeEventListener("mousemove", onDrag);
            document.removeEventListener("touchmove", onDrag);
            document.removeEventListener("mouseup", endDrag);
            document.removeEventListener("touchend", endDrag);

            listContainer.insertBefore(draggingEl, placeholder);
            placeholder.remove();

            draggingEl.style.position = "";
            draggingEl.style.top = "";
            draggingEl.style.left = "";
            draggingEl.style.width = "";
            draggingEl.style.zIndex = "";
            draggingEl.style.boxShadow = "";
            draggingEl.style.transform = "";
            draggingEl.style.transition = "";

            // Save new order to localStorage
            const newOrderNodes = [
              ...listContainer.querySelectorAll(".workout-list-item"),
            ];
            const newIndices = newOrderNodes.map((node) =>
              parseInt(node.dataset.idx),
            );

            const key = `kinetic_workout_${window.currentSelectedDate}`;
            const data = JSON.parse(localStorage.getItem(key));

            const oldExercises = [...data.exercises];
            data.exercises = newIndices.map((oldIdx) => oldExercises[oldIdx]);

            localStorage.setItem(key, JSON.stringify(data));

            // Reset active window to avoid sync issues
            window.currentActiveExerciseIndex = -1;

            draggingEl = null;
            placeholder = null;

            renderActiveWorkout(window.currentSelectedDate, data);
          };
        };

        window.addAdHocExercise = function () {
          const name = prompt("Enter Exercise Name:");
          if (!name || name.trim() === "") return;

          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));

          data.exercises.push({
            name: name.trim(),
            muscle: "Custom",
            type: "Standard",
            sets: [
              { weight: "", reps: "", intensity: "WORKING", completed: false },
            ],
          });

          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.deleteExerciseFromWorkout = function (exIdx) {
          if (!confirm("Remove this exercise from today's workout?")) return;
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          data.exercises.splice(exIdx, 1);
          localStorage.setItem(key, JSON.stringify(data));
          window.currentActiveExerciseIndex = -1;
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.deleteWorkoutSession = function () {
          if (!confirm("Erase this training session entirely?")) return;
          clearInterval(workoutTimerInterval);
          window.isWorkoutTimerRunning = false;
          window.currentActiveExerciseIndex = -1;

          const key = `kinetic_workout_${window.currentSelectedDate}`;
          localStorage.removeItem(key);
          renderWorkoutView(window.currentSelectedDate);
        };

        window.stepVal = function (exIdx, setIdx, field, delta) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          let current =
            parseFloat(data.exercises[exIdx].sets[setIdx][field]) || 0;
          let newVal = Math.max(0, current + delta);
          data.exercises[exIdx].sets[setIdx][field] = newVal;
          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.deleteSet = function (exIdx, setIdx) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          data.exercises[exIdx].sets.splice(setIdx, 1);
          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.updateSet = function (exIdx, setIdx, field, val) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          data.exercises[exIdx].sets[setIdx][field] = val;
          localStorage.setItem(key, JSON.stringify(data));

          // If it's a completed set, re-calculate and re-render the whole view for live volume updates
          if (
            data.exercises[exIdx].sets[setIdx].completed ||
            field === "weight" ||
            field === "reps"
          ) {
            renderActiveWorkout(window.currentSelectedDate, data);
          }
        };

        window.toggleSetIntensity = function (exIdx, setIdx) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          const cycle = ["WARMUP", "WORKING", "PR", "FAILURE"];
          const current = data.exercises[exIdx].sets[setIdx].intensity;
          const next = cycle[(cycle.indexOf(current) + 1) % cycle.length];
          data.exercises[exIdx].sets[setIdx].intensity = next;
          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.toggleSetCompleted = function (exIdx, setIdx) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          const currentStatus = data.exercises[exIdx].sets[setIdx].completed;
          data.exercises[exIdx].sets[setIdx].completed = !currentStatus;

          // Removed auto-spawn functionality

          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.toggleSetIntensity = function (exIdx, setIdx) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          const levels = ["WARMUP", "WORKING", "PR", "FAILURE"];
          let cur = levels.indexOf(
            data.exercises[exIdx].sets[setIdx].intensity || "WORKING",
          );
          cur = (cur + 1) % levels.length;
          data.exercises[exIdx].sets[setIdx].intensity = levels[cur];
          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        window.addWorkoutSet = function (exIdx) {
          const key = `kinetic_workout_${window.currentSelectedDate}`;
          const data = JSON.parse(localStorage.getItem(key));
          const sets = data.exercises[exIdx].sets;

          let lastSet = sets.length > 0 ? sets[sets.length - 1] : null;
          sets.push({
            weight: lastSet ? lastSet.weight : "",
            reps: lastSet ? lastSet.reps : "",
            intensity: "WORKING",
            completed: false,
          });

          localStorage.setItem(key, JSON.stringify(data));
          renderActiveWorkout(window.currentSelectedDate, data);
        };

        // Call to render workout on initial load
        const todayStr = new Date().toISOString().split("T")[0];
        window.currentSelectedDate = todayStr;
        renderWorkoutView(todayStr);
      });
    </script>
  </body>
</html>
