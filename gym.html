<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pulse Performance</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* Colors */
        --surface: #0e0e0e;
        --surface-container-lowest: #0a0a0a;
        --surface-container-low: #131313;
        --surface-container-high: #201f1f;
        --surface-container-highest: #262626;
        --surface-variant: rgba(25, 25, 25, 0.6);

        --primary: #f3ffca;
        --primary-container: #cafd00;
        --on-primary-container: #4a5e00;

        --secondary: #ff7441;
        --secondary-container: #ab3600;
        --on-secondary-container: #fff6f3;

        --outline: #ffffff;
        --outline-variant: rgba(255, 255, 255, 0.15); /* Ghost Border */

        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.6);

        /* Typography */
        --font-display: "Lexend", sans-serif;
        --font-body: "Manrope", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--surface);
        color: var(--text-primary);
        font-family: var(--font-body);
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* App-like feel */
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }

      /* Main Content Area */
      main {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding: 0 24px;
        padding-bottom: 110px; /* Space for bottom nav */
      }

      /* Top Header */
      .top-header {
        padding-top: max(
          env(safe-area-inset-top, 48px),
          48px
        ); /* Clear notch */
        padding-bottom: 24px;
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 100;
      }

      .header-subtitle {
        font-size: 0.75rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-secondary);
        font-weight: 700;
        margin-bottom: 6px;
      }

      .header-title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-title-row h1 {
        margin: 0;
        font-size: 2.2rem;
        line-height: 1.1;
        font-family: var(--font-display);
        font-weight: 700;
      }

      .month-controls {
        display: flex;
        gap: 12px;
      }

      .icon-btn {
        background: var(--surface-container-high);
        border: none;
        width: 44px;
        height: 44px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .icon-btn:active {
        transform: scale(0.92);
      }

      .icon-btn svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Calendar Widget */
      .calendar-wrapper {
        margin: 0 -24px; /* Bleed to edges */
        position: relative;
      }

      .calendar-wrapper::before,
      .calendar-wrapper::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 24px;
        z-index: 2;
        pointer-events: none;
      }
      .calendar-wrapper::before {
        left: 0;
        background: linear-gradient(to right, var(--surface), transparent);
      }
      .calendar-wrapper::after {
        right: 0;
        background: linear-gradient(to left, var(--surface), transparent);
      }

      .calendar-scroll {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 10px 0;
        position: relative;
      }

      .calendar-scroll::-webkit-scrollbar {
        display: none;
      }

      .scroll-pad {
        flex-shrink: 0;
        width: calc(50vw - 32px); /* Half viewport minus half card width */
      }

      .date-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 64px;
        border-radius: 32px;
        scroll-snap-align: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        background: transparent;
      }

      .date-card .day-name {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .date-card .day-number {
        font-size: 1.25rem;
        font-family: var(--font-display);
        font-weight: 700;
        color: var(--text-secondary);
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 24px;
        background: var(--surface-container-high);
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        border: 2px solid transparent;
      }

      /* Active State */
      .date-card.active .day-name {
        color: var(--primary);
      }

      .date-card.active .day-number {
        background: var(--primary-container);
        color: var(--on-primary-container);
        transform: scale(1.05);
        box-shadow: 0 4px 16px rgba(202, 253, 0, 0.2);
        border-color: var(--primary-container);
      }

      /* Today indicator */
      .date-card.today:not(.active) .day-number {
        border-color: var(--primary);
        color: var(--text-primary);
      }

      .date-card:not(.active) .day-number {
        color: var(--text-primary);
      }

      .date-card.other-month {
        opacity: 0.35;
      }

      .date-card.other-month.active {
        opacity: 1; /* In case an other-month card is momentarily active */
      }

      .workout-content {
        margin-top: 32px;
      }

      /* Routines View */
      .routines-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-bottom: 24px;
      }

      .routine-card {
        position: relative;
        border-radius: 28px;
        height: 200px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 24px;
        background: var(--surface-container-high);
        color: var(--text-primary);
        text-decoration: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .routine-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.95) 0%,
          rgba(0, 0, 0, 0.2) 100%
        );
        z-index: 1;
      }

      .routine-card-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        z-index: 0;
        opacity: 0.5;
        transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .routine-card:active .routine-card-bg {
        transform: scale(1.05);
      }

      .routine-card-content {
        position: relative;
        z-index: 2;
      }

      .routine-tags {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .tag {
        font-size: 0.65rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        letter-spacing: 0.5px;
      }
      .tag.accent {
        background: var(--secondary-container);
        color: var(--on-secondary-container);
      }

      .routine-title {
        font-size: 2rem;
        font-family: var(--font-display);
        font-weight: 700;
        text-transform: uppercase;
        line-height: 1.1;
        margin-bottom: 8px;
        font-style: italic;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.8);
      }

      .routine-meta {
        display: flex;
        gap: 24px;
      }

      .meta-item {
        display: flex;
        flex-direction: column;
      }
      .meta-value {
        font-size: 1.25rem;
        font-family: var(--font-display);
        font-weight: 700;
        color: var(--primary);
      }
      .meta-label {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .routine-play-btn {
        position: absolute;
        right: 24px;
        bottom: 24px;
        width: 48px;
        height: 48px;
        border-radius: 24px;
        background: var(--text-primary);
        color: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        cursor: pointer;
        border: none;
        transition: transform 0.2s;
      }
      .routine-play-btn:active {
        transform: scale(0.92);
      }
      .routine-play-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .danger-btn {
        background: transparent;
        color: #ff453a;
        border: 1px solid rgba(255, 69, 58, 0.3);
        border-radius: 24px;
        padding: 16px;
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
      }
      .danger-btn:active {
        background: rgba(255, 69, 58, 0.1);
      }

      /* Add Routine Dotted Card */
      .add-routine-card {
        height: 140px;
        border: 2px dashed var(--outline-variant);
        border-radius: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        background: rgba(255, 255, 255, 0.01);
      }

      .add-routine-card:active {
        background: rgba(255, 255, 255, 0.04);
        transform: scale(0.98);
      }

      .add-btn-circle {
        width: 44px;
        height: 44px;
        border-radius: 22px;
        background: var(--surface-container-highest);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
      }
      .add-btn-circle svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2.5;
      }
      .add-routine-text {
        font-weight: 800;
        font-family: var(--font-display);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-size: 0.85rem;
      }

      /* iOS Sheet Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 92vh;
        background: var(--surface-container-low);
        border-radius: 32px 32px 0 0;
        z-index: 2001;
        transform: translateY(100%);
        transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        display: flex;
        flex-direction: column;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.6);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
      .bottom-sheet.active {
        transform: translateY(0);
      }

      .sheet-drag-handle {
        width: 36px;
        height: 5px;
        background: var(--outline-variant);
        border-radius: 3px;
        margin: 12px auto;
      }

      .sheet-header {
        padding: 8px 24px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .sheet-title {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 700;
      }
      .sheet-close {
        background: var(--surface-container-highest);
        border: none;
        color: var(--text-primary);
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        padding: 8px 16px;
        border-radius: 16px;
        text-transform: uppercase;
      }

      .sheet-content {
        flex: 1;
        overflow-y: auto;
        padding: 0 24px 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .input-group label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        font-weight: 800;
      }
      .input-group input,
      .input-group select {
        background: var(--surface-container-highest);
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 16px;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
      }
      .input-group select {
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 16px center;
        background-size: 16px;
      }
      .input-group input:focus,
      .input-group select:focus {
        border-color: var(--primary);
        background: rgba(243, 255, 202, 0.05);
      }

      .primary-btn {
        background: var(--primary);
        color: var(--on-primary-container);
        border: none;
        border-radius: 24px;
        padding: 18px;
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 8px 24px rgba(243, 255, 202, 0.2);
      }
      .primary-btn:active {
        transform: scale(0.96);
        box-shadow: 0 4px 12px rgba(243, 255, 202, 0.2);
      }
      .primary-btn.secondary {
        background: var(--surface-container-highest);
        color: var(--text-primary);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: none;
      }

      .modal-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 12px 0;
      }

      /* Exercises List in Modal */
      .exercises-preview {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .exercise-pill {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--surface-container-high);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      .exercise-pill-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .ex-name {
        font-weight: 800;
        font-family: var(--font-display);
        font-size: 1.1rem;
      }
      .ex-meta {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        font-weight: 700;
      }
      .ex-remove-btn {
        background: var(--surface-container-highest);
        border: none;
        color: var(--secondary);
        font-size: 0.75rem;
        font-weight: 800;
        padding: 8px 12px;
        border-radius: 12px;
        cursor: pointer;
      }

      /* Bottom Navigation Bar - Floating Pill */
      .bottom-nav {
        position: fixed;
        bottom: max(env(safe-area-inset-bottom, 24px), 24px);
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 48px);
        max-width: 400px;
        height: 68px;
        background: rgba(30, 30, 30, 0.45); /* More transparent base */
        backdrop-filter: saturate(180%) blur(32px);
        -webkit-backdrop-filter: saturate(180%) blur(32px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-radius: 34px;
        padding: 0 8px;
        z-index: 1000;
        border: 1px solid rgba(255, 255, 255, 0.08); /* Ghost border */
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 1px rgba(255, 255, 255, 0.05);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 28px;
        color: var(--text-secondary);
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        position: relative;
      }

      .nav-item svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .nav-item.active {
        color: var(--primary);
      }

      .nav-item.active svg {
        stroke-width: 2.5;
        filter: drop-shadow(
          0 0 8px rgba(243, 255, 202, 0.3)
        ); /* Ambient Glow */
        transform: translateY(-2px);
      }

      /* Interactive states */
      .nav-item:active {
        transform: scale(0.92);
      }

      /* Views (Pages) */
      .view-section {
        display: none;
        animation: fadeIn 0.4s ease-out;
      }

      .view-section.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-family: var(--font-display);
        font-size: 2.5rem;
        margin-bottom: 16px;
        font-weight: 700;
      }

      p {
        font-size: 1rem;
        color: var(--text-secondary);
      }

      /* Workout Tracker */
      .add-workout-btn {
        height: 120px;
        border: 2px dashed rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--outline-variant);
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 24px;
      }
      .add-workout-btn:active {
        background: rgba(255, 255, 255, 0.05);
      }

      .heroic-card {
        background: linear-gradient(
          145deg,
          var(--surface-container-high) 0%,
          var(--surface-container) 100%
        );
        border-radius: 28px;
        padding: 24px;
        margin-top: 24px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .heroic-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--primary);
        border-radius: 4px;
      }
      .heroic-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
      }
      .heroic-tag {
        background: var(--primary);
        color: var(--surface);
        padding: 6px 12px;
        border-radius: 12px;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 0.75rem;
        text-transform: uppercase;
      }
      .heroic-time {
        color: var(--outline-variant);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .heroic-title {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 900;
        line-height: 1.1;
        text-transform: uppercase;
        margin-bottom: 24px;
        width: 80%;
        word-wrap: break-word;
      }
      .heroic-stats {
        display: flex;
        gap: 16px;
      }
      .heroic-stat {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 12px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      .heroic-stat-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }
      .heroic-stat-val {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 800;
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .heroic-stat-val small {
        font-size: 0.8rem;
        color: var(--outline-variant);
        font-weight: 600;
      }
      .heroic-stat .accent {
        color: #ff7e67;
      }

      .section-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 32px 0 16px;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: var(--text-primary);
      }
      .section-divider::before {
        content: "";
        width: 24px;
        height: 3px;
        background: var(--primary);
        border-radius: 2px;
      }

      /* Workout Queue & Active Ex */
      .queue-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 48px 0 24px;
      }
      .queue-header h3 {
        font-family: var(--font-display);
        font-weight: 800;
        margin: 0;
        color: var(--text-secondary);
      }
      .add-ex-text-btn {
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
      }

      .qued-ex-card {
        background: var(--surface-container-high);
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s;
        -webkit-user-select: none;
        user-select: none;
      }
      .qued-ex-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .qued-ex-title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.1rem;
      }
      .qued-ex-meta {
        font-size: 0.7rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin-top: 2px;
      }
      .qued-ex-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* Active Exercise Layout */
      .active-ex-card {
        background: var(--surface-container-high);
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 24px;
        border: 1px solid rgba(255, 69, 58, 0.4); /* Orange/Red border */
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        position: relative;
        -webkit-user-select: none;
        user-select: none;
      }
      .active-ex-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 32px;
        bottom: 32px;
        width: 4px;
        background: var(--accent);
        border-radius: 4px; /* Orange indicator */
      }
      .active-ex-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      .active-ex-info h3 {
        font-family: var(--font-display);
        font-size: 1.6rem;
        margin: 0;
        line-height: 1.1;
      }
      .active-ex-info p {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin: 4px 0 0;
      }
      .active-ex-close {
        background: rgba(255, 255, 255, 0.05);
        border: none;
        border-radius: 16px;
        width: 32px;
        height: 32px;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Logging Rows */
      .log-row {
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
        margin-bottom: 12px;
        padding: 12px 20px;
        transition: all 0.2s;
      }
      .log-row.active {
        background: transparent;
        border: 1px solid rgba(255, 69, 58, 0.2); /* Orange/Red subtle border */
        box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.3);
        padding: 20px;
        flex-wrap: wrap;
      }
      .log-row-idx {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--outline-variant);
        width: 40px;
      }
      .log-row.active .log-row-idx {
        color: var(--accent);
      }

      /* Inactive/Completed Metrics */
      .log-row-static {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
        margin-bottom: 12px;
      }
      .log-row-static.completed {
        opacity: 0.8;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .log-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .log-col label {
        display: block;
        font-size: 0.55rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .log-col val {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.2rem;
      }

      /* Active Log Controls */
      .log-stepper-group {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 12px;
        width: 48%;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .log-stepper-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 16px;
        font-size: 1.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .log-stepper-val {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .log-stepper-val label {
        font-size: 0.55rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .log-stepper-val input {
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.8rem;
        width: 70px;
        text-align: center;
        outline: none;
        margin-top: -4px;
      }
      .log-stepper-val.t-reps input {
        color: var(--outline-variant);
      }

      .log-set-btn {
        width: 100%;
        background: var(--secondary);
        color: var(--surface);
        border: none;
        border-radius: 16px;
        padding: 16px;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1rem;
        text-transform: uppercase;
        margin-top: 20px;
        cursor: pointer;
      }

      .set-intensity-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        border-radius: 8px;
        font-size: 0.65rem;
        text-transform: uppercase;
        padding: 6px 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .set-intensity-btn.WARMUP {
        color: #f39c12;
        border-color: #f39c12;
      }
      .set-intensity-btn.WORKING {
        color: #ffffff;
        border-color: rgba(255,255,255,0.4);
      }
      .set-intensity-btn.PR {
        background: #bf360c;
        color: white;
        border-color: #bf360c;
      }
      .set-intensity-btn.FAILURE {
        background: #d32f2f;
        color: white;
        border-color: #d32f2f;
      }

      .add-set-btn {
        width: 100%;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        border: none;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-weight: 700;
        font-size: 0.85rem;
        margin-top: 12px;
        cursor: pointer;
      }

      .log-action-col {
        width: 40px;
        display: flex;
        justify-content: flex-end;
      }
      .log-complete-check {
        width: 24px;
        height: 24px;
        border-radius: 12px;
        background: var(--surface-container-highest);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .log-row.completed .log-complete-check {
        background: var(--text-primary);
        color: var(--surface);
      }
      .log-row.completed .log-metric-static val {
        color: var(--primary);
        opacity: 0.7;
      }
      .log-row.completed {
        opacity: 0.8;
      }

      .finish-workout-btn {
        background: #bf360c;
        color: white;
        width: 100%;
        border: none;
        border-radius: 24px;
        padding: 20px;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.1rem;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 32px;
        cursor: pointer;
      }

      /* Select Routine Modal List */
      .select-routine-item {
        background: var(--surface-container-high);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .select-routine-item:active {
        transform: scale(0.98);
      }
      .select-routine-item-info h4 {
        margin: 0 0 4px;
        font-family: var(--font-display);
        font-size: 1.1rem;
      }
      .select-routine-item-info p {
        margin: 0;
        font-size: 0.8rem;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <main id="app-content">
      <!-- Workout View -->
      <section id="view-workout" class="view-section active">
        <header class="top-header">

        <div class="routines-list" id="routines-list">

      <!-- Rituals View -->

    <!-- Routine Builder Modal / Bottom Sheet -->
    <div

    <div class="bottom-sheet" id="routine-modal">

      </div>
      <div class="sheet-content">
        <div class="input-group">

          <input
            type="text"

        <div class="input-group">
          <label>Cover Image URL (Optional)</label>
          <input
            type="text"

            placeholder="https://example.com/image.jpg"
          />

        <div class="input-group">
          <label>Est. Time (Mins)</label>
          <input type="number" id="routine-time" placeholder="45" />

        <div class="modal-divider"></div>

        <div
          class="sheet-title"
          style="font-size: 1.2rem; color: var(--primary)"
        >
          Routine Exercises
        </div>

        <div class="exercises-preview" id="exercises-preview">
          <!-- Added exercises show here -->
        </div>

        <div class="input-group">
          <label>Exercise Name</label>
          <input

        <div class="input-group">

        <button
          class="primary-btn secondary"
          id="add-exercise-btn"
          onclick="addExerciseToDraft()"
        >
          <svg
            viewBox="0 0 24 24"
            width="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"

            <path d="M12 5v14M5 12h14" stroke-linecap="round" />

          Add Exercise

        <div class="modal-divider" style="margin-top: 16px"></div>

    <!-- Select Routine Modal -->
    <div
      class="modal-overlay"
      id="select-routine-overlay"
      onclick="closeSelectRoutineModal()"
    ></div>
    <div class="bottom-sheet" id="select-routine-modal">
      <div class="sheet-header">
        <h3 class="sheet-title">Select Routine</h3>
        <button class="sheet-close" onclick="closeSelectRoutineModal()">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>

      <div class="sheet-content" id="select-routine-list">

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const navItems = document.querySelectorAll(".nav-item");
        const views = document.querySelectorAll(".view-section");

        navItems.forEach((item) => {
          item.addEventListener("click", (e) => {
            e.preventDefault();

            // Remove active class from all nav items and views
            navItems.forEach((nav) => nav.classList.remove("active"));
            views.forEach((view) => view.classList.remove("active"));

            // Add active class to clicked nav item
            item.classList.add("active");

            // Show target view
            const targetId = item.getAttribute("data-target");
            document.getElementById(targetId).classList.add("active");
          });
        });

        // --- Calendar & Storage Logic ---
        const Storage = {
          getKey: (dateStr) => `kinetic_workout_${dateStr}`,
          saveWorkout: (dateStr, data) => {
            localStorage.setItem(Storage.getKey(dateStr), JSON.stringify(data));
          },
          getWorkout: (dateStr) => {
            const data = localStorage.getItem(Storage.getKey(dateStr));
            return data ? JSON.parse(data) : null;
          },
        };

        class CalendarWidget {
          constructor() {
            this.currentDate = new Date();
            this.activeDate = new Date();
            this.scrollContainer = document.getElementById("calendar-scroll");
            this.monthDisplay = document.getElementById(
              "current-month-display",
            );
            this.selectedDateDisplay = document.getElementById(
              "selected-date-display",
            );

            this.init();
          }

          init() {
            if (!this.scrollContainer) return;

            document
              .getElementById("prev-month")
              .addEventListener("click", () => this.changeMonth(-1));
            document
              .getElementById("next-month")
              .addEventListener("click", () => this.changeMonth(1));

            this.renderCalendar();
          }

          changeMonth(delta) {
            this.currentDate.setMonth(this.currentDate.getMonth() + delta);
            this.renderCalendar();
          }

          formatDateStr(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
          }

          renderCalendar() {
            if (!this.scrollContainer) return;
            this.scrollContainer.innerHTML = "";

            const year = this.currentDate.getFullYear();
            const month = this.currentDate.getMonth();

            const monthNames = [
              "January",
              "February",
              "March",
              "April",
              "May",
              "June",
              "July",
              "August",
              "September",
              "October",
              "November",
              "December",
            ];
            this.monthDisplay.textContent = `${monthNames[month]} ${year}`;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevMonthDays = new Date(year, month, 0).getDate();
            const daysOfWeek = [
              "SUN",
              "MON",
              "TUE",
              "WED",
              "THU",
              "FRI",
              "SAT",
            ];

            const todayStr = this.formatDateStr(new Date());
            let activeCard = null;

            const allDates = [];

            // Add 15 days from previous month
            for (let i = prevMonthDays - 14; i <= prevMonthDays; i++) {
              allDates.push({
                date: new Date(year, month - 1, i),
                isCurrentMonth: false,
              });
            }

            // Add current month
            for (let i = 1; i <= daysInMonth; i++) {
              allDates.push({
                date: new Date(year, month, i),
                isCurrentMonth: true,
              });
            }

            // Add 15 days from next month
            for (let i = 1; i <= 15; i++) {
              allDates.push({
                date: new Date(year, month + 1, i),
                isCurrentMonth: false,
              });
            }

            // Pad left for centering
            const paddingLeft = document.createElement("div");
            paddingLeft.className = "scroll-pad";
            this.scrollContainer.appendChild(paddingLeft);

            allDates.forEach((item) => {
              const date = item.date;
              const dateStr = this.formatDateStr(date);
              const dayName = daysOfWeek[date.getDay()];

              const card = document.createElement("div");
              card.className = `date-card ${item.isCurrentMonth ? "" : "other-month"}`;
              card.dataset.date = dateStr;

              if (dateStr === todayStr) {
                card.classList.add("today");
              }

              if (
                dateStr === this.formatDateStr(this.activeDate) &&
                item.isCurrentMonth
              ) {
                card.classList.add("active");
                activeCard = card;
              }

              card.innerHTML = `
                            <div class="day-name">${dayName}</div>
                            <div class="day-number">${date.getDate()}</div>
                        `;

              card.addEventListener("click", () => {
                if (!item.isCurrentMonth) {
                  this.activeDate = date;
                  this.currentDate = new Date(
                    date.getFullYear(),
                    date.getMonth(),
                    1,
                  );
                  this.renderCalendar();
                  this.selectDate(date, null);
                } else {
                  this.selectDate(date, card);
                }
              });
              this.scrollContainer.appendChild(card);
            });

            // Pad right for centering
            const paddingRight = document.createElement("div");
            paddingRight.className = "scroll-pad";
            this.scrollContainer.appendChild(paddingRight);

            // Center active or today after render
            requestAnimationFrame(() => {
              if (activeCard) {
                this.centerCard(activeCard);
              } else if (
                year === new Date().getFullYear() &&
                month === new Date().getMonth()
              ) {
                const todayCard = this.scrollContainer.querySelector(".today");
                if (todayCard) this.centerCard(todayCard);
              } else {
                const firstCard = this.scrollContainer.querySelector(
                  ".date-card:not(.other-month)",
                );
                if (firstCard) this.centerCard(firstCard);
              }
            });
          }

          selectDate(date, cardElement = null) {
            this.activeDate = date;
            const dateCards =
              this.scrollContainer.querySelectorAll(".date-card");
            dateCards.forEach((c) => c.classList.remove("active"));

            let targetCard = cardElement;
            if (!targetCard) {
              targetCard = Array.from(dateCards).find(
                (c) =>
                  c.dataset.date === this.formatDateStr(date) &&
                  !c.classList.contains("other-month"),
              );
            }

            if (targetCard) {
              targetCard.classList.add("active");
              this.centerCard(targetCard);
            }

            // Update dummy text
            const isToday =
              this.formatDateStr(date) === this.formatDateStr(new Date());
            const displayStr = isToday
              ? "today"
              : date.toLocaleDateString("en-US", {
                  month: "short",
                  day: "numeric",
                  year: "numeric",
                });
            if (this.selectedDateDisplay) {
              this.selectedDateDisplay.textContent = displayStr;
            }

            // Trigger generic event for workout view to load local storage data
            document.dispatchEvent(
              new CustomEvent("dateSelected", {
                detail: { date: this.formatDateStr(date) },
              }),
            );
          }

          centerCard(card) {
            const containerCenter = this.scrollContainer.clientWidth / 2;
            const cardCenter = card.offsetLeft + card.offsetWidth / 2;
            this.scrollContainer.scrollTo({
              left: cardCenter - containerCenter,
              behavior: "smooth",
            });
          }
        }

        // Initialize calendar
        window.calendarWidget = new CalendarWidget();

        // --- Routine Builder Logic ---
        let currentDraftExercises = [];
        let currentEditingRoutineId = null;
        let currentEditingExerciseIndex = -1;

        window.openRoutineModal = function (routineId = null) {
          document
            .getElementById("routine-modal-overlay")

            document.getElementById("routine-image").value = "";

            `<svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg> Add Exercise`;

        window.closeRoutineModal = function () {

            .getElementById("routine-modal-overlay")

        window.deleteEditingRoutine = function () {
          if (!currentEditingRoutineId) return;
          if (!confirm("Are you sure you want to delete this routine?")) return;

          let savedRoutines = JSON.parse(
            localStorage.getItem("kinetic_routines") || "[]",

        window.editDraftExercise = function (idx) {
          const ex = currentDraftExercises[idx];
          document.getElementById("ex-name").value = ex.name;
          document.getElementById("ex-muscle").value = ex.muscle;
          document.getElementById("ex-type").value = ex.type;
          currentEditingExerciseIndex = idx;

          const btn = document.getElementById("add-exercise-btn");
          btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg> Update Exercise`;

        window.addExerciseToDraft = function () {
          const nameInp = document.getElementById("ex-name");
          const muscInp = document.getElementById("ex-muscle");
          const typeInp = document.getElementById("ex-type");

          if (!nameInp.value.trim()) return alert("Exercise name required");

          const newEx = {
            name: nameInp.value.trim(),
            muscle: muscInp.value.trim() || "General",
            type: typeInp.value,
          };

          if (currentEditingExerciseIndex !== -1) {
            currentDraftExercises[currentEditingExerciseIndex] = newEx;
            currentEditingExerciseIndex = -1;
            document.getElementById("add-exercise-btn").innerHTML =
              `<svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg> Add Exercise`;
          } else {
            currentDraftExercises.push(newEx);
